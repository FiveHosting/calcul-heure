# Fichier de configuration Nginx pour Calculateur d'Heures v2.0
# Emplacement: /etc/nginx/sites-available/calcul-heure
# 
# Installation:
# 1. sudo nano /etc/nginx/sites-available/calcul-heure
# 2. Copier le contenu de ce fichier
# 3. sudo ln -s /etc/nginx/sites-available/calcul-heure /etc/nginx/sites-enabled/
# 4. sudo nginx -t
# 5. sudo systemctl restart nginx

upstream calcul_heure_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name votre_domaine.com www.votre_domaine.com;
    
    # Pour Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Tout le reste redirige HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Configuration HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name votre_domaine.com www.votre_domaine.com;

    # ============================================
    # 🔐 CERTIFICATS SSL - À ADAPTER À VOS CHEMINS
    # ============================================
    # VestaCP: /home/admin/conf/web/ssl.calcul-heure.com.crt
    # VestaCP: /home/admin/conf/web/ssl.calcul-heure.com.key
    # Let's Encrypt (certbot): /etc/letsencrypt/live/votre_domaine.com/
    
    ssl_certificate /etc/letsencrypt/live/votre_domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre_domaine.com/privkey.pem;
    
    # Si vous créez manuellement via VestaCP, utiliser:
    # ssl_certificate /home/admin/conf/web/ssl.calcul-heure.com.crt;
    # ssl_certificate_key /home/admin/conf/web/ssl.calcul-heure.com.key;

    # ============================================
    # 🔒 CONFIGURATION SSL
    # ============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ============================================
    # 🛡️ HEADERS DE SÉCURITÉ
    # ============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # ============================================
    # 📊 LOGS
    # ============================================
    access_log /home/admin/logs/calcul-heure.access.log combined;
    error_log /home/admin/logs/calcul-heure.error.log warn;

    # ============================================
    # ⚙️ LIMITES
    # ============================================
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ============================================
    # 🔄 COMPRESSION
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";

    # ============================================
    # 🚀 REVERSE PROXY VERS NODE.JS
    # ============================================
    location / {
        proxy_pass http://calcul_heure_backend;
        proxy_http_version 1.1;
        
        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (si nécessaire à l'avenir)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Connection keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============================================
    # 📚 ASSETS STATIQUES (Si nécessaire)
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://calcul_heure_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # 📁 FICHIERS SYSTÈME À BLOQUER
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /database\.db {
        deny all;
        access_log off;
        log_not_found off;
    }

}

# ============================================
# 📝 NOTES DE CONFIGURATION
# ============================================
#
# 1. PREMIÈRES ÉTAPES:
#    - Remplacer "votre_domaine.com" par votre domaine
#    - Changer les chemins des certificats SSL
#    - Créer le dossier /home/admin/logs/ si nécessaire
#
# 2. AVEC LET'S ENCRYPT (Recommandé):
#    sudo certbot certonly --webroot -w /var/www/certbot -d votre_domaine.com
#    (Puis mettre à jour les chemins certificates et certificate_key)
#
# 3. VIA VestaCP:
#    - Uploader le certificat dans VestaCP
#    - Adapter les chemins des certificats
#
# 4. TESTER:
#    sudo nginx -t              # Test de syntaxe
#    sudo systemctl restart nginx # Redémarrer
#
# 5. DEBUG:
#    sudo tail -f /home/admin/logs/calcul-heure.error.log
#    sudo tail -f /home/admin/logs/calcul-heure.access.log
#
# 6. REGEX EXPLICATIONS:
#    location ~ /\.      = Fichiers commençant par un point
#    location ~ /\.env   = Fichier .env spécifiquement
#    location ~ /database\.db = database.db
#
# ============================================
