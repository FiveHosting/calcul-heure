<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur d'Heures</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --error: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            color: #111827;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .hidden {
            display: none;
        }

        .entries-list {
            display: grid;
            gap: 1rem;
        }

        .entry-item {
            background: #f9fafb;
            border-left: 4px solid #6366f1;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entry-info {
            flex: 1;
        }

        .entry-info strong {
            display: block;
            color: #111827;
            margin-bottom: 0.25rem;
        }

        .entry-info small {
            color: #6b7280;
            display: block;
            margin-bottom: 0.25rem;
        }

        .entry-actions {
            display: flex;
            gap: 0.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }

        .admin-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: #f3f4f6;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #6366f1;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .user-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            flex: 1;
        }

        .user-info strong {
            display: block;
            color: #111827;
        }

        .user-info small {
            color: #6b7280;
            display: block;
        }

        .user-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .entry-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .entry-actions {
                width: 100%;
                margin-top: 1rem;
            }

            .user-item {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .user-actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Authentification -->
        <div id="authSection" class="hidden">
            <div class="header">
                <h1>Calculateur d'Heures</h1>
                <p>Bienvenue - Connectez-vous pour continuer</p>
            </div>

            <div class="grid-2">
                <!-- Connexion -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Connexion</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Nom d'utilisateur</label>
                            <input type="text" id="loginUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Connexion
                        </button>
                    </form>
                </div>

                <!-- Inscription -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Inscription</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>Nom d'utilisateur</label>
                            <input type="text" id="registerUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="registerEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="registerPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Confirmer mot de passe</label>
                            <input type="password" id="registerPassword2" required>
                        </div>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-user-plus"></i> Inscription
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Application -->
        <div id="appSection" class="hidden">
            <div class="header">
                <h1>Calculateur d'Heures
                    <span id="adminBadge" class="admin-badge hidden">
                        <i class="fas fa-crown"></i> Admin
                    </span>
                </h1>
                <p id="userDisplay"></p>
            </div>

            <div id="alertContainer"></div>

            <!-- Onglets -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('entries')">
                    <i class="fas fa-list"></i> Mes Heures
                </button>
                <button class="tab-btn" onclick="showTab('admin')" id="adminTabBtn" class="hidden">
                    <i class="fas fa-cog"></i> Administration
                </button>
                <button class="tab-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Deconnexion
                </button>
            </div>

            <!-- Tab: Heures -->
            <div id="entriesTab">
                <div class="grid-2">
                    <!-- Formulaire -->
                    <div class="card">
                        <h2 style="margin-bottom: 1.5rem;">Ajouter une entree</h2>
                        <form id="entryForm">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="entryDate" required>
                            </div>
                            <div class="form-group">
                                <label>Heure debut</label>
                                <input type="time" id="startTime" required>
                            </div>
                            <div class="form-group">
                                <label>Heure fin</label>
                                <input type="time" id="endTime" required>
                            </div>
                            <div class="form-group">
                                <label>Taux horaire (euros)</label>
                                <input type="number" id="hourlyRate" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label>Description (optionnel)</label>
                                <input type="text" id="description" placeholder="Ex: Travail projet A">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Ajouter
                            </button>
                        </form>
                    </div>

                    <!-- Stats -->
                    <div>
                        <div class="stats" id="statsContainer"></div>
                    </div>
                </div>

                <!-- Liste -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Historique</h2>
                    <div class="form-group">
                        <label>Filtrer par mois</label>
                        <input type="month" id="monthFilter">
                    </div>
                    <div id="entriesList" class="entries-list"></div>
                </div>
            </div>

            <!-- Tab: Admin -->
            <div id="adminTab" class="hidden">
                <!-- Gestion utilisateurs -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Gestion des utilisateurs</h2>
                    <div id="usersList"></div>
                </div>

                <!-- Stats globales -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Statistiques globales</h2>
                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-value" id="totalUsers">0</div>
                            <div class="stat-label">Utilisateurs</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="totalEntries">0</div>
                            <div class="stat-label">Entrees</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="totalHours">0</div>
                            <div class="stat-label">Heures travaillees</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="totalSalary">0</div>
                            <div class="stat-label">Total salaires</div>
                        </div>
                    </div>
                </div>

                <!-- Toutes les entrees -->
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Toutes les entrees</h2>
                    <div id="allEntriesList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');

        document.addEventListener('DOMContentLoaded', () => {
            if (token && currentUser.username) {
                showApp();
            } else {
                showAuth();
            }
        });

        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('entryDate').valueAsDate = new Date();
            document.getElementById('userDisplay').textContent = currentUser.username;
            if (currentUser.role === 'admin') {
                document.getElementById('adminBadge').classList.remove('hidden');
                document.getElementById('adminTabBtn').classList.remove('hidden');
            }
            loadEntries();
            loadStats();
        }

        function showTab(tab) {
            document.querySelectorAll('[id$="Tab"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            event.target.closest('.tab-btn')?.classList.add('active');
            if (tab === 'admin' && currentUser.role === 'admin') {
                loadAdminData();
            }
        }

        function showAlert(msg, type = 'success') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = 'alert alert-' + type;
            alert.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + '"></i><span>' + msg + '</span>';
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 4000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('loginForm').reset();
                showAlert('Connecte avec succes');
                showApp();
            } catch (err) {
                showAlert(err.message, 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = document.getElementById('registerPassword').value;
            const pwd2 = document.getElementById('registerPassword2').value;
            if (pwd !== pwd2) {
                showAlert('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            try {
                const res = await fetch(API_URL + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('registerUsername').value,
                        email: document.getElementById('registerEmail').value,
                        password: pwd
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('registerForm').reset();
                showAlert('Compte cree');
                showApp();
            } catch (err) {
                showAlert(err.message, 'error');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            token = null;
            currentUser = {};
            showAuth();
        }

        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const start = new Date('2000-01-01 ' + document.getElementById('startTime').value);
            const end = new Date('2000-01-01 ' + document.getElementById('endTime').value);
            const diff = (end - start) / (1000 * 60 * 60);
            if (diff <= 0) {
                showAlert('Heure fin apres heure debut', 'error');
                return;
            }
            try {
                const res = await fetch(API_URL + '/entries', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        date: document.getElementById('entryDate').value,
                        start_time: document.getElementById('startTime').value,
                        end_time: document.getElementById('endTime').value,
                        hourly_rate: parseFloat(document.getElementById('hourlyRate').value),
                        description: document.getElementById('description').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showAlert('Entree ajoutee');
                document.getElementById('entryForm').reset();
                document.getElementById('entryDate').valueAsDate = new Date();
                loadEntries();
                loadStats();
            } catch (err) {
                showAlert(err.message, 'error');
            }
        });

        async function loadEntries() {
            try {
                const res = await fetch(API_URL + '/entries', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                const entries = Array.isArray(data) ? data : (Array.isArray(data.entries) ? data.entries : []);
                const list = document.getElementById('entriesList');
                list.innerHTML = entries.map(e => 
                    '<div class="entry-item"><div class="entry-info"><strong>' + e.date + '</strong><small>' + (e.startTime || e.start_time) + ' - ' + (e.endTime || e.end_time) + '</small><small>' + (e.totalHours || e.total_hours) + 'h - ' + (parseFloat(e.salary) || 0).toFixed(2) + '€</small>' + (e.description ? '<small><strong>:</strong> ' + e.description + '</small>' : '') + '</div><div class="entry-actions"><button class="btn btn-danger" onclick="deleteEntry(' + e.id + ')"><i class="fas fa-trash"></i></button></div></div>'
                ).join('');
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        async function deleteEntry(id) {
            if (!confirm('Confirmer?')) return;
            try {
                const res = await fetch(API_URL + '/entries/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Erreur');
                showAlert('Supprimee');
                loadEntries();
                loadStats();
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(API_URL + '/entries', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                const entries = Array.isArray(data) ? data : (Array.isArray(data.entries) ? data.entries : []);
                const hours = entries.reduce((s, e) => s + parseFloat(e.totalHours || e.total_hours || 0), 0);
                const salary = entries.reduce((s, e) => s + parseFloat(e.salary || 0), 0);
                document.getElementById('statsContainer').innerHTML = '<div class="stat-box"><div class="stat-value">' + entries.length + '</div><div class="stat-label">Entrees</div></div><div class="stat-box"><div class="stat-value">' + hours.toFixed(1) + '</div><div class="stat-label">Heures</div></div><div class="stat-box"><div class="stat-value">' + salary.toFixed(2) + '€</div><div class="stat-label">Total</div></div>';
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        async function loadAdminData() {
            if (currentUser.role !== 'admin') return;
            try {
                const ures = await fetch(API_URL + '/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const udata = await ures.json();
                document.getElementById('usersList').innerHTML = udata.users.map(u => 
                    '<div class="user-item"><div class="user-info"><strong>' + u.username + '</strong><small>' + u.email + '</small><small>Role: ' + u.role + '</small></div><div class="user-actions"><button class="btn btn-danger" onclick="deleteUser(' + u.id + ')"><i class="fas fa-trash"></i></button></div></div>'
                ).join('');

                const sres = await fetch(API_URL + '/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const stats = await sres.json();
                document.getElementById('totalUsers').textContent = stats.totalUsers;
                document.getElementById('totalEntries').textContent = stats.totalEntries;
                document.getElementById('totalHours').textContent = stats.totalHours.toFixed(1);
                document.getElementById('totalSalary').textContent = stats.totalSalary.toFixed(2) + 'e';

                const eres = await fetch(API_URL + '/admin/entries', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const edata = await eres.json();
                document.getElementById('allEntriesList').innerHTML = edata.entries.map(e => 
                    '<div class="entry-item"><div class="entry-info"><strong>' + e.username + ' - ' + e.date + '</strong><small>' + e.start_time + ' - ' + e.end_time + '</small><small>' + e.total_hours + 'h - ' + e.salary.toFixed(2) + 'e</small></div></div>'
                ).join('');
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Confirmer?')) return;
            try {
                const res = await fetch(API_URL + '/admin/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Erreur');
                showAlert('Supprime');
                loadAdminData();
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }
    </script>
</body>
</html>
